<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Restaurar IDs y FOTOS Marilyn</title>
</head>
<body style="background: #111; color: #fff; text-align: center; padding: 50px;">
    <h1>💎 Restauración con Fotos</h1>
    <input type="file" id="fileInput" accept=".json" style="margin: 20px;">
    <br><button onclick="procesar()" style="padding: 10px 20px; background: #D4AF37; cursor: pointer;">🚀 Restaurar</button>
    <h2 id="status"></h2>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const app = initializeApp({
            apiKey: "AIzaSyBmPvAk_lSJ1TlBVtMqKAC1HaPM5eVeZxo",
            authDomain: "creaciones-marilyn.firebaseapp.com",
            databaseURL: "https://creaciones-marilyn-default-rtdb.firebaseio.com",
            projectId: "creaciones-marilyn",
            storageBucket: "creaciones-marilyn.firebasestorage.app",
            messagingSenderId: "565099684746",
            appId: "1:565099684746:web:a99ccfb9796aea22725e73"
        });
        const db = getDatabase(app);

        window.procesar = function() {
            const fileInput = document.getElementById('fileInput');
            if(fileInput.files.length === 0) return alert("Sube el JSON");
            
            document.getElementById('status').innerText = "Cargando...";
            const reader = new FileReader();
            reader.onload = async function(e) {
                const data = JSON.parse(e.target.result);
                const firebaseData = {};
                
                data.productos.forEach(p => {
                    firebaseData[p.id] = {
                        id: p.id,
                        codigo_barras: p.codigo_barras || "",
                        nombre: p.nombre,
                        categoria: p.categoria || "General",
                        variante: p.variante || "",
                        precio_gs: p.precio_gs,
                        stock_actual: p.stock_actual,
                        stock_minimo: p.stock_minimo || 2,
                        iva_pct: p.iva_pct || 10,
                        activo: true,
                        estado: "normal",
                        /* AQUI ESTÁ LA LÍNEA MÁGICA QUE ME FALTÓ AYER 👇 */
                        images: p.images || (p.image ? [p.image] : ["img/logo_jpg.jpg"])
                    };
                });
                await set(ref(db, 'productos'), firebaseData);
                document.getElementById('status').innerText = "✅ ¡FOTOS E IDS RESTAURADOS!";
            };
            reader.readAsText(fileInput.files[0]);
        };
    </script>
</body>
</html>
