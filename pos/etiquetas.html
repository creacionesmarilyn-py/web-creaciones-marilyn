<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Etiquetas Masivo - Creaciones Marilyn</title>
    <link rel="stylesheet" href="css/marilyn.css">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    
    <style>
        /* --- ESTILOS DE PANTALLA (NO IMPRESIÓN) --- */
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
        }

        .control-panel {
            background-color: #1a1a1a;
            border-bottom: 2px solid var(--color-gold);
            padding: 15px;
            flex: 0 0 auto;
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .panel-grupo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .lista-seleccion {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background-color: #111;
            border-right: 1px solid #333;
            min-width: 320px;
        }

        .filtros-avanzados {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 1px solid #444;
            padding-bottom: 15px;
        }

        .input-dark {
            width: 100%;
            padding: 10px;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
        }

        .producto-row {
            display: flex;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #333;
            gap: 10px;
        }
        .producto-row:hover { background-color: #222; }
        
        .check-grande { transform: scale(1.5); margin-right: 10px; cursor: pointer; accent-color: var(--color-gold); }

        .preview-container {
            flex: 2;
            background-color: #333; 
            padding: 40px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* La Hoja Visual */
        #hojaImpresion {
            background-color: white;
            width: 216mm; 
            min-height: 356mm; 
            padding: 10mm; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            
            display: flex;
            flex-wrap: wrap;
            gap: 1mm; /* MÁXIMA DENSIDAD: Reducido de 2mm a 1mm */
            align-content: flex-start;
            justify-content: flex-start;
        }

        /* --- MICRO SEPARADOR --- */
        .separador-producto {
            width: 100%; 
            font-size: 8pt; /* Letra mucho más pequeña */
            font-weight: bold;
            color: #444;
            margin-top: 2mm; /* Espacio mínimo */
            margin-bottom: 1mm;
            padding-bottom: 1mm;
            border-bottom: 1px solid #ccc;
            text-transform: uppercase;
            page-break-after: avoid;
            break-after: avoid;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .separador-producto:first-child { margin-top: 0; }

        /* Estiqueta Individual 35x25 mm Intacta */
        .etiqueta {
            border: 1px dashed #aaa; 
            box-sizing: border-box;
            width: 35mm;  
            height: 25mm; 
            padding: 1mm; /* Padding reducido para más espacio interno */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow: hidden;
            background: white;
            color: black;
            font-family: Arial, sans-serif;
            text-align: center;
            page-break-inside: avoid;
            break-inside: avoid;
        }

        .etiqueta-nombre {
            font-size: 5.5pt; /* Letra ajustada para nombres largos */
            font-weight: bold;
            line-height: 1;
            max-height: 2em; 
            overflow: hidden;
            margin-top: 1mm;
            text-transform: uppercase;
        }

        .etiqueta-precio {
            font-size: 7pt;
            font-weight: bold;
        }

        .etiqueta svg {
            width: 100%;
            height: 10mm; 
            max-width: 100%;
        }

        .btn-gold {
            background-color: var(--color-gold);
            color: #000;
            border: none;
            padding: 10px 15px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            font-size: 13px;
        }
        .btn-gold:hover { background-color: #e5c156; }

        .btn-outline {
            border: 1px solid var(--color-gold);
            color: var(--color-gold);
            background: transparent;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 4px;
        }

        /* --- ESTILOS DE IMPRESIÓN BASE --- */
        @media print {
            html, body, .main-container, .preview-container {
                height: auto !important;
                overflow: visible !important;
                display: block !important;
                background-color: white !important;
                margin: 0 !important;
                padding: 0 !important;
            }
            .control-panel, .lista-seleccion { display: none !important; }
            #hojaImpresion {
                width: 100% !important;
                padding: 0 !important;
                margin: 0 !important;
                box-shadow: none !important;
                position: relative !important; 
            }
        }
    </style>
</head>
<body>

    <div class="control-panel no-print">
        <div class="panel-grupo">
            <a href="admin.html" class="btn-outline">⬅ Volver al Admin</a>
            <h2 style="margin: 0; color: white; font-size: 1.2rem;">🖨️ Etiquetas Optimizadas</h2>
        </div>
        
        <div class="panel-grupo">
            <label style="color: #aaa; font-size: 0.9rem;">Copias x Producto:</label>
            <input type="number" id="inputCopias" value="15" min="1" style="width: 60px; height: 35px; text-align: center; font-weight: bold;">
            <button class="btn-gold" onclick="window.generarVistaPrevia()">🔄 Generar Grilla</button>
            
            <span style="border-left: 1px solid #555; height: 30px; margin: 0 5px;"></span>
            
            <button class="btn-gold" style="background-color: #9C27B0; color: white;" onclick="window.imprimirEtiquetas('OFICIO')">📄 Imprimir Oficio</button>
            <button class="btn-gold" style="background-color: #2196F3; color: white;" onclick="window.imprimirEtiquetas('A4')">📄 Imprimir A4</button>
            <button class="btn-gold" style="background-color: var(--color-success); color: white;" onclick="window.imprimirEtiquetas('TERMICA')">🎟️ Rollo Térmico</button>
        </div>
    </div>

    <div class="main-container no-print">
        <div class="lista-seleccion">
            <div class="filtros-avanzados">
                <select id="filtroCategoria" class="input-dark" onchange="window.filtrarLista()">
                    <option value="TODAS">📁 Todas las Categorías</option>
                </select>
                <input type="text" id="filtroProd" class="input-dark" placeholder="🔍 Buscar producto específico..." onkeyup="window.filtrarLista()">
                <div style="display: flex; gap: 10px; margin-top: 5px;">
                    <button class="btn-outline" style="font-size: 12px; flex:1;" onclick="window.checkTodos(true)">☑️ Marcar Visibles</button>
                    <button class="btn-outline" style="font-size: 12px; flex:1; border-color: #666; color: #aaa;" onclick="window.checkTodos(false)">Desmarcar</button>
                </div>
            </div>
            <div id="contenedorLista"><p style="color: #aaa; padding: 10px;">Conectando a Firebase...</p></div>
        </div>

        <div class="preview-container">
            <div id="hojaImpresion">
                <div style="grid-column: 1 / -1; text-align: center; color: #aaa; margin-top: 50px; font-size: 1.2rem;">
                    🎯 Modo Alta Densidad Activado.<br><br>
                    Selecciona hasta 4 productos, deja 15 copias y dale a Generar.
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBmPvAk_lSJ1TlBVtMqKAC1HaPM5eVeZxo",
            authDomain: "creaciones-marilyn.firebaseapp.com",
            databaseURL: "https://creaciones-marilyn-default-rtdb.firebaseio.com",
            projectId: "creaciones-marilyn",
            storageBucket: "creaciones-marilyn.firebasestorage.app",
            messagingSenderId: "565099684746",
            appId: "1:565099684746:web:a99ccfb9796aea22725e73"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.productosCache = [];

        document.addEventListener('DOMContentLoaded', () => {
            const productosRef = ref(db, 'productos');
            onValue(productosRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    window.productosCache = Object.values(data);
                    window.productosCache.sort((a, b) => (a.nombre || '').localeCompare(b.nombre || ''));
                    
                    const categoriasUnicas = [...new Set(window.productosCache.map(p => p.categoria || "Sin Categoría"))].sort();
                    const selectCat = document.getElementById('filtroCategoria');
                    selectCat.innerHTML = '<option value="TODAS">📁 Todas las Categorías</option>' + 
                                          categoriasUnicas.map(c => `<option value="${c}">${c}</option>`).join('');

                    window.renderizarLista(window.productosCache);
                }
            });
        });

        window.renderizarLista = function(productos) {
            const container = document.getElementById('contenedorLista');
            container.innerHTML = '';
            productos.forEach(p => {
                if (p.estado === 'inactivo') return;
                const div = document.createElement('div');
                div.className = 'producto-row';
                div.setAttribute('data-categoria', p.categoria || "Sin Categoría");
                div.innerHTML = `
                    <input type="checkbox" class="prod-check check-grande" value="${p.id}">
                    <div style="flex: 1;">
                        <div style="color: white; font-weight: bold; font-size: 0.9em;">${p.nombre || 'Sin nombre'}</div>
                        <div style="color: #aaa; font-size: 0.8em; margin-top: 3px;">
                            <span style="background: #333; padding: 2px 6px; border-radius: 4px; font-size: 0.8em; margin-right: 5px;">${p.categoria || 'Varios'}</span>
                            ${p.codigo_barras || 'Auto-ID'} - ${Number(p.precio_gs || 0).toLocaleString('es-PY')} Gs
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        };

        window.filtrarLista = function() {
            const textoBusqueda = document.getElementById('filtroProd').value.toLowerCase();
            const categoriaSeleccionada = document.getElementById('filtroCategoria').value;
            const filas = document.querySelectorAll('.producto-row');
            
            filas.forEach(fila => {
                const contenido = fila.innerText.toLowerCase();
                const categoriaFila = fila.getAttribute('data-categoria');
                const cumpleTexto = contenido.includes(textoBusqueda);
                const cumpleCategoria = (categoriaSeleccionada === 'TODAS' || categoriaFila === categoriaSeleccionada);
                fila.style.display = (cumpleTexto && cumpleCategoria) ? 'flex' : 'none';
            });
        };

        window.checkTodos = function(estado) {
            document.querySelectorAll('.prod-check').forEach(c => {
                if (c.closest('.producto-row').style.display !== 'none') c.checked = estado;
            });
        };

        window.generarVistaPrevia = function() {
            const hoja = document.getElementById('hojaImpresion');
            hoja.innerHTML = ''; 

            const checkboxes = document.querySelectorAll('.prod-check:checked');
            const copiasPorProducto = parseInt(document.getElementById('inputCopias').value) || 15;

            if (checkboxes.length === 0) { alert("Selecciona al menos un producto."); return; }

            checkboxes.forEach(chk => {
                const idStr = chk.value;
                const prod = window.productosCache.find(p => String(p.id) === idStr);
                
                if (prod) {
                    const separador = document.createElement('div');
                    separador.className = 'separador-producto';
                    separador.innerHTML = `<span>✂️ ${prod.nombre}</span><span>(${copiasPorProducto})</span>`;
                    hoja.appendChild(separador);

                    for (let i = 0; i < copiasPorProducto; i++) {
                        const etiqueta = document.createElement('div');
                        etiqueta.className = 'etiqueta';
                        const codigoParaBarras = prod.codigo_barras && prod.codigo_barras.trim() !== "" ? prod.codigo_barras : prod.id;
                        const precioFormateado = Number(prod.precio_gs || 0).toLocaleString('es-PY');

                        etiqueta.innerHTML = `
                            <div class="etiqueta-nombre">${prod.nombre}</div>
                            <div class="etiqueta-precio">Gs. ${precioFormateado}</div>
                            <svg class="barcode"
                                jsbarcode-format="CODE128"
                                jsbarcode-value="${codigoParaBarras}"
                                jsbarcode-textmargin="0"
                                jsbarcode-fontoptions="bold"
                                jsbarcode-height="15" 
                                jsbarcode-width="1"
                                jsbarcode-displayValue="true"
                                jsbarcode-fontSize="8"
                                jsbarcode-margin="0"
                            ></svg>
                        `;
                        hoja.appendChild(etiqueta);
                    }
                }
            });

            try { JsBarcode(".barcode").init(); } catch (e) { console.error(e); }
        };

        window.imprimirEtiquetas = function(modo) {
            const hoja = document.getElementById('hojaImpresion');
            if (hoja.innerHTML.trim() === '' || hoja.innerText.includes('Selecciona')) return;

            let styleEl = document.getElementById('print-override');
            if (!styleEl) {
                styleEl = document.createElement('style');
                styleEl.id = 'print-override';
                document.head.appendChild(styleEl);
            }

            if (modo === 'OFICIO') {
                styleEl.innerHTML = `@media print { @page { size: legal !important; margin: 10mm !important; } .etiqueta { border: 0.5px dashed #ccc !important; } }`;
            } else if (modo === 'A4') {
                styleEl.innerHTML = `@media print { @page { size: A4 !important; margin: 10mm !important; } .etiqueta { border: 0.5px dashed #ccc !important; } }`;
            } else if (modo === 'TERMICA') {
                styleEl.innerHTML = `@media print { @page { size: 35mm 25mm !important; margin: 0 !important; } #hojaImpresion { display: block !important; padding: 0 !important; gap: 0 !important; } .separador-producto { display: none !important; } .etiqueta { width: 35mm !important; height: 25mm !important; border: none !important; page-break-after: always !important; margin: 0 !important; } }`;
            }

            setTimeout(() => { window.print(); }, 200);
        };
    </script>
</body>
</html>
