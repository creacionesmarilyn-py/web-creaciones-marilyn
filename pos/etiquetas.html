<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Etiquetas - Creaciones Marilyn</title>
    <link rel="stylesheet" href="css/marilyn.css">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    
    <style>
        /* --- ESTILOS DE PANTALLA (NO IMPRESIÓN) --- */
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
        }

        /* Panel de Control Superior */
        .control-panel {
            background-color: #1a1a1a;
            border-bottom: 2px solid var(--color-gold);
            padding: 15px;
            flex: 0 0 auto;
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .panel-grupo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Layout Principal */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Lista de Productos (Izquierda) */
        .lista-seleccion {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background-color: #111;
            border-right: 1px solid #333;
            min-width: 300px;
        }

        .producto-row {
            display: flex;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #333;
            gap: 10px;
        }
        .producto-row:hover { background-color: #222; }
        
        .check-grande { transform: scale(1.5); margin-right: 10px; cursor: pointer; }

        /* Área de Previsualización (Derecha) */
        .preview-container {
            flex: 2;
            background-color: #333; 
            padding: 40px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* La Hoja Visual (En Pantalla siempre se ve tipo A4) */
        #hojaImpresion {
            background-color: white;
            width: 210mm;
            min-height: 297mm;
            padding: 10mm; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            
            display: flex;
            flex-wrap: wrap;
            gap: 2mm; 
            align-content: flex-start;
            justify-content: flex-start;
        }

        /* Estilo de la Etiqueta Individual 3x2 cm */
        .etiqueta {
            border: 1px dashed #aaa; 
            box-sizing: border-box;
            width: 35mm;  
            height: 25mm; 
            padding: 1.5mm;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: white;
            color: black;
            font-family: Arial, sans-serif;
            text-align: center;
            page-break-inside: avoid;
            break-inside: avoid;
        }

        .etiqueta-nombre {
            font-size: 6pt; 
            font-weight: bold;
            line-height: 1;
            max-height: 2em; 
            overflow: hidden;
            margin-bottom: 1mm;
            text-transform: uppercase;
        }

        .etiqueta-precio {
            font-size: 7pt;
            font-weight: bold;
            margin-bottom: 1mm;
        }

        .etiqueta svg {
            width: 100%;
            height: 10mm; 
            max-width: 100%;
        }

        /* Botones personalizados */
        .btn-gold {
            background-color: var(--color-gold);
            color: #000;
            border: none;
            padding: 10px 15px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            font-size: 13px;
        }
        .btn-gold:hover { background-color: #e5c156; }

        .btn-outline {
            border: 1px solid var(--color-gold);
            color: var(--color-gold);
            background: transparent;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 4px;
        }

        /* --- ESTILOS DE IMPRESIÓN BASE --- */
        @media print {
            html, body, .main-container, .preview-container {
                height: auto !important;
                overflow: visible !important;
                display: block !important;
                background-color: white !important;
                margin: 0 !important;
                padding: 0 !important;
            }
            .control-panel, .lista-seleccion {
                display: none !important;
            }
            #hojaImpresion {
                width: 100% !important;
                padding: 0 !important;
                margin: 0 !important;
                box-shadow: none !important;
                position: relative !important; 
            }
        }
    </style>
</head>
<body>

    <div class="control-panel no-print">
        <div class="panel-grupo">
            <a href="admin.html" class="btn-outline">⬅ Volver al Admin</a>
            <h2 style="margin: 0; color: white; font-size: 1.2rem;">🖨️ Etiquetas de Nube</h2>
        </div>
        
        <div class="panel-grupo">
            <label style="color: #aaa; font-size: 0.9rem;">Copias:</label>
            <input type="number" id="inputCopias" value="1" min="1" style="width: 50px; height: 35px; text-align: center;">
            <button class="btn-gold" onclick="window.generarVistaPrevia()">🔄 Generar</button>
            
            <span style="border-left: 1px solid #555; height: 30px; margin: 0 5px;"></span>
            
            <button class="btn-gold" style="background-color: #2196F3; color: white;" onclick="window.imprimirEtiquetas('A4')">📄 Imprimir A4</button>
            <button class="btn-gold" style="background-color: var(--color-success); color: white;" onclick="window.imprimirEtiquetas('TERMICA')">🎟️ Rollo Térmico</button>
        </div>
    </div>

    <div class="main-container no-print">
        
        <div class="lista-seleccion">
            <div style="margin-bottom: 15px; border-bottom: 1px solid #444; padding-bottom: 10px;">
                <input type="text" id="filtroProd" placeholder="🔍 Buscar producto..." style="margin-bottom: 10px; width: 100%; padding: 8px;" onkeyup="window.filtrarLista()">
                <div style="display: flex; gap: 10px;">
                    <button class="btn-outline" style="font-size: 12px; flex:1;" onclick="window.checkTodos(true)">Todos</button>
                    <button class="btn-outline" style="font-size: 12px; flex:1;" onclick="window.checkTodos(false)">Ninguno</button>
                </div>
            </div>
            
            <div id="contenedorLista">
                <p style="color: #aaa; padding: 10px;">Conectando a Firebase...</p>
            </div>
        </div>

        <div class="preview-container">
            <div id="hojaImpresion">
                <div style="grid-column: 1 / -1; text-align: center; color: #aaa; margin-top: 50px;">
                    Selecciona productos a la izquierda y dale a "Generar"
                </div>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBmPvAk_lSJ1TlBVtMqKAC1HaPM5eVeZxo",
            authDomain: "creaciones-marilyn.firebaseapp.com",
            databaseURL: "https://creaciones-marilyn-default-rtdb.firebaseio.com",
            projectId: "creaciones-marilyn",
            storageBucket: "creaciones-marilyn.firebasestorage.app",
            messagingSenderId: "565099684746",
            appId: "1:565099684746:web:a99ccfb9796aea22725e73"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Variable global para usar en las funciones
        window.productosCache = [];

        document.addEventListener('DOMContentLoaded', () => {
            const productosRef = ref(db, 'productos');
            
            onValue(productosRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    window.productosCache = Object.values(data);
                    window.productosCache.sort((a, b) => (a.nombre || '').localeCompare(b.nombre || ''));
                    window.renderizarLista(window.productosCache);
                } else {
                    document.getElementById('contenedorLista').innerHTML = '<p style="color: red;">No hay productos en la base de datos.</p>';
                }
            });
        });

        window.renderizarLista = function(productos) {
            const container = document.getElementById('contenedorLista');
            container.innerHTML = '';

            productos.forEach(p => {
                if (p.estado === 'inactivo') return; // Filtramos inactivos igual que el Admin

                const div = document.createElement('div');
                div.className = 'producto-row';
                div.innerHTML = `
                    <input type="checkbox" class="prod-check check-grande" value="${p.id}">
                    <div style="flex: 1;">
                        <div style="color: white; font-weight: bold; font-size: 0.9em;">${p.nombre || 'Sin nombre'}</div>
                        <div style="color: #aaa; font-size: 0.8em;">${p.codigo_barras || 'Sin código'} - ${Number(p.precio_gs || 0).toLocaleString('es-PY')} Gs</div>
                    </div>
                `;
                container.appendChild(div);
            });
        };

        window.filtrarLista = function() {
            const texto = document.getElementById('filtroProd').value.toLowerCase();
            const filas = document.querySelectorAll('.producto-row');
            
            filas.forEach(fila => {
                const contenido = fila.innerText.toLowerCase();
                fila.style.display = contenido.includes(texto) ? 'flex' : 'none';
            });
        };

        window.checkTodos = function(estado) {
            document.querySelectorAll('.prod-check').forEach(c => {
                if (c.closest('.producto-row').style.display !== 'none') {
                    c.checked = estado;
                }
            });
        };

        window.generarVistaPrevia = function() {
            const hoja = document.getElementById('hojaImpresion');
            hoja.innerHTML = ''; 

            const checkboxes = document.querySelectorAll('.prod-check:checked');
            const copiasPorProducto = parseInt(document.getElementById('inputCopias').value) || 1;

            if (checkboxes.length === 0) {
                alert("Selecciona al menos un producto.");
                return;
            }

            checkboxes.forEach(chk => {
                const idStr = chk.value;
                const prod = window.productosCache.find(p => String(p.id) === idStr);
                
                if (prod) {
                    for (let i = 0; i < copiasPorProducto; i++) {
                        const etiqueta = document.createElement('div');
                        etiqueta.className = 'etiqueta';
                        
                        // Si no tiene código de barras escrito, usa su ID único de Firebase
                        const codigoParaBarras = prod.codigo_barras && prod.codigo_barras.trim() !== "" ? prod.codigo_barras : prod.id;
                        const precioFormateado = Number(prod.precio_gs || 0).toLocaleString('es-PY');

                        etiqueta.innerHTML = `
                            <div class="etiqueta-nombre">${prod.nombre}</div>
                            <div class="etiqueta-precio">Gs. ${precioFormateado}</div>
                            <svg class="barcode"
                                jsbarcode-format="CODE128"
                                jsbarcode-value="${codigoParaBarras}"
                                jsbarcode-textmargin="0"
                                jsbarcode-fontoptions="bold"
                                jsbarcode-height="25"
                                jsbarcode-width="1"
                                jsbarcode-displayValue="true"
                                jsbarcode-fontSize="10"
                                jsbarcode-margin="0"
                            ></svg>
                        `;
                        hoja.appendChild(etiqueta);
                    }
                }
            });

            try {
                // Genera los códigos de barra en los SVG creados
                JsBarcode(".barcode").init();
            } catch (e) {
                console.error("Error generando barras", e);
            }
        };

        window.imprimirEtiquetas = function(modo) {
            const hoja = document.getElementById('hojaImpresion');
            if (hoja.innerHTML.trim() === '' || hoja.innerText.includes('Selecciona productos')) {
                alert("Primero debes generar la vista previa de las etiquetas.");
                return;
            }

            let styleEl = document.getElementById('print-override');
            if (!styleEl) {
                styleEl = document.createElement('style');
                styleEl.id = 'print-override';
                document.head.appendChild(styleEl);
            }

            if (modo === 'TERMICA') {
                styleEl.innerHTML = `
                    @media print {
                        @page { size: 35mm 25mm !important; margin: 0 !important; }
                        #hojaImpresion { display: block !important; padding: 0 !important; gap: 0 !important; }
                        .etiqueta { 
                            width: 35mm !important; 
                            height: 25mm !important; 
                            border: none !important; 
                            page-break-after: always !important; 
                            margin: 0 !important;
                        }
                    }
                `;
            } else {
                styleEl.innerHTML = `
                    @media print {
                        @page { size: A4 !important; margin: 10mm !important; }
                        .etiqueta { border: 0.5px dashed #ccc !important; }
                    }
                `;
            }

            setTimeout(() => { 
                window.print(); 
            }, 200);
        };
    </script>
</body>
</html>
