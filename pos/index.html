<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caja - Creaciones Marilyn</title>
    <link rel="stylesheet" href="css/marilyn.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        /* ESTILOS ESPECÍFICOS PARA LA CAJA (POS) */
        html, body { height: 100%; margin: 0; padding: 0; }
        body { display: flex; flex-direction: column; overflow: hidden; background-color: #000; }
        header { flex: 0 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; border-bottom: 2px solid var(--color-gold); }
        .cajera-info { font-size: 0.9rem; color: #aaa; }
        .hora-actual { font-size: 1.2rem; font-weight: bold; color: var(--color-gold); }
        .main-layout { display: flex; flex: 1; height: 100%; overflow: hidden; min-height: 0; }
        .panel-izquierdo { flex: 6; display: flex; flex-direction: column; padding: 15px; border-right: 1px solid #333; background-color: #1a1a1a; }
        .buscador-container { flex: 0 0 auto; margin-bottom: 15px; display: flex; gap: 10px; }
        #inputBusqueda { font-size: 24px; height: 60px; border: 2px solid var(--color-gold); background-color: #fff; color: #000; flex: 1; }
        .btn-scan { background-color: var(--color-gold); border: none; border-radius: 8px; font-size: 1.8rem; padding: 0 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .resultados-grid { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; align-content: start; padding-right: 5px; }
        .producto-card { background-color: var(--color-dark-grey); border: 1px solid #444; border-radius: 8px; padding: 15px; display: flex; flex-direction: column; justify-content: space-between; height: 160px; cursor: pointer; transition: transform 0.1s; }
        .producto-card:active { transform: scale(0.95); background-color: #333; }
        .prod-nombre { font-weight: bold; font-size: 1rem; color: #fff; line-height: 1.2; overflow: hidden; }
        .prod-variante { font-size: 0.85rem; color: #aaa; margin-top: 5px; }
        .prod-precio { font-size: 1.3rem; color: var(--color-gold); font-weight: bold; margin-top: auto; }
        .panel-derecho { flex: 4; display: flex; flex-direction: column; background-color: #000; border-left: 2px solid var(--color-gold); min-height: 0; }
        .carrito-lista { flex: 1; overflow-y: auto; padding: 10px; min-height: 0; }
        .carrito-item { display: flex; justify-content: space-between; align-items: center; background-color: #222; padding: 12px; margin-bottom: 8px; border-radius: 6px; border-left: 4px solid var(--color-gold); }
        .item-info { flex: 1; }
        .item-nombre { font-weight: bold; display: block; }
        .item-precio { color: #888; font-size: 0.9rem; }
        .item-controles { display: flex; align-items: center; gap: 10px; }
        .btn-qty { width: 36px; height: 36px; border-radius: 50%; border: 1px solid #555; background: #333; color: white; font-size: 18px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .item-cantidad { font-size: 1.2rem; font-weight: bold; min-width: 25px; text-align: center; }
        .totales-section { flex: 0 0 auto; background-color: #1a1a1a; padding: 15px 20px; border-top: 1px solid #333; }
        .fila-total { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 1rem; color: #aaa; }
        .gran-total { font-size: 2rem; color: var(--color-gold); font-weight: bold; text-align: right; margin: 5px 0 15px 0; }
        .btn-cobrar { width: 100%; height: 60px; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 2px; background-color: var(--color-success); color: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border: none; cursor: pointer; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 1000; visibility: hidden; opacity: 0; transition: opacity 0.2s; }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-content { background: var(--color-dark-grey); border: 2px solid var(--color-gold); width: 500px; padding: 30px; border-radius: 15px; box-shadow: 0 0 30px rgba(212, 175, 55, 0.2); }
        .metodos-pago { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-pago { flex: 1; height: 60px; font-size: 1.2rem; border: 2px solid #555; background: transparent; color: #fff; }
        .btn-pago.active { border-color: var(--color-gold); background-color: rgba(212, 175, 55, 0.2); color: var(--color-gold); }
        .input-pago { font-size: 2rem; text-align: right; height: 70px; margin-bottom: 10px; background: #fff; color: #000; font-weight: bold; }
        .vuelto-display { font-size: 1.5rem; text-align: right; margin-bottom: 20px; color: var(--color-text-main); }
        #reader video { border-radius: 8px; object-fit: cover; width: 100% !important; height: 300px !important; }
    </style>
</head>
<body>

    <header>
        <div class="logo">💎 CREACIONES MARILYN</div>
        <div class="cajera-info">Cajera: <strong>Dueña</strong></div>
        <div class="hora-actual" id="reloj">00:00</div>
    </header>

    <div class="main-layout">
        
        <div class="panel-izquierdo">
            <div class="buscador-container">
                <input type="text" id="inputBusqueda" placeholder="Buscar o escanear manual..." autocomplete="off" autofocus>
                <button class="btn-scan" onclick="window.abrirEscanerCamara()" title="Escanear con Cámara">📷</button>
            </div>
            <div id="gridResultados" class="resultados-grid"></div>
        </div>

        <div class="panel-derecho">
            <div class="carrito-lista" id="listaCarrito">
                <div style="text-align: center; color: #555; margin-top: 50px;">Carrito vacío</div>
            </div>

            <div class="totales-section">
                <div class="fila-total">
                    <span>Subtotal:</span>
                    <span id="txtSubtotal">0 Gs</span>
                </div>
                <div class="fila-total">
                    <span>IVA (10%):</span>
                    <span id="txtIva">0 Gs</span>
                </div>
                <div class="gran-total" id="txtTotal">0 Gs</div>
                <button class="btn btn-cobrar" onclick="window.abrirModalCobro()">COBRAR</button>
            </div>
        </div>

    </div>

    <div class="modal-overlay" id="modalScanner">
        <div class="modal-content" style="text-align: center; width: 90%; max-width: 450px; padding: 20px;">
            <h2 style="color: white; margin-bottom: 5px; font-size: 1.5rem;">Modo Ráfaga Activo 📷</h2>
            <p id="scannerFeedback" style="color: var(--color-gold); height: 40px; font-weight: bold; margin-bottom: 5px; font-size: 1.1rem;">Iniciando lente principal...</p>
            <div id="reader" style="width: 100%; min-height: 250px; background: #000; border-radius: 8px; overflow: hidden; border: 2px solid #333; display: flex; align-items: center; justify-content: center;"></div>
            <button class="btn btn-danger" style="margin-top: 20px; width: 100%; padding: 15px; font-size: 1.2rem; font-weight: bold;" onclick="window.cerrarEscanerCamara()">🛑 Terminar Escaneo</button>
        </div>
    </div>

    <div class="modal-overlay" id="modalCobro">
        <div class="modal-content">
            <h2 style="text-align: center; color: white; margin-bottom: 20px;">Confirmar Venta</h2>
            
            <div class="metodos-pago">
                <button class="btn btn-pago active" onclick="window.setMetodo('EFECTIVO')">💵 Efectivo</button>
                <button class="btn btn-pago" onclick="window.setMetodo('TRANSFERENCIA')">🏦 Transferencia</button>
            </div>

            <label>Monto Recibido (Gs):</label>
            <input type="number" id="inputRecibido" class="input-pago" placeholder="0" onkeyup="window.calcularVuelto()">
            
            <div class="vuelto-display">
                Vuelto: <span id="txtVuelto" style="color: var(--color-success); font-weight: bold;">0 Gs</span>
            </div>

            <div style="display: flex; gap: 10px;">
                <button class="btn btn-danger" onclick="window.cerrarModalCobro()">Cancelar</button>
                <button class="btn btn-success" style="flex: 2;" id="btn-confirmar-venta" onclick="window.finalizarVenta()">✅ CONFIRMAR</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalExito">
        <div class="modal-content" style="text-align: center;">
            <h1 style="color: var(--color-success); font-size: 3rem; margin-bottom: 10px;">✅</h1>
            <h2 style="color: white; margin-bottom: 5px;">¡Venta Exitosa!</h2>
            <p style="color: #aaa; margin-bottom: 25px;">Comprobante N° <span id="exitoNro" style="color: var(--color-gold); font-weight: bold;"></span></p>
            
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <button class="btn btn-primary" onclick="window.descargarTicketPDF()">📥 1. Descargar Ticket (PDF)</button>
                <button class="btn" style="background-color: #25D366; color: white;" onclick="window.enviarPorWhatsApp()">📲 2. Enviar por WhatsApp</button>
                <button class="btn btn-outline" style="margin-top: 15px; border-color: #555; background: transparent; color: white;" onclick="window.prepararNuevaVenta()">🛒 Nueva Venta</button>
            </div>
        </div>
    </div>

    <div id="qrOculto" style="display: none;"></div>

    <script type="module">
        import dbSystem from './js/db.js';
        
        // Conexión Directa a Firebase para subir las ventas
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBmPvAk_lSJ1TlBVtMqKAC1HaPM5eVeZxo",
            authDomain: "creaciones-marilyn.firebaseapp.com",
            databaseURL: "https://creaciones-marilyn-default-rtdb.firebaseio.com",
            projectId: "creaciones-marilyn",
            storageBucket: "creaciones-marilyn.firebasestorage.app",
            messagingSenderId: "565099684746",
            appId: "1:565099684746:web:a99ccfb9796aea22725e73"
        };
        const app = initializeApp(firebaseConfig);
        const rtdb = getDatabase(app);

        // --- ESTADO DE LA APLICACIÓN ---
        let carrito = [];
        let productosCache = []; 
        let metodoPago = 'EFECTIVO';
        let totalGlobal = 0;
        let ultimaVentaDatos = null; 
        let motorCamara = null; 
        let isScanningPaused = false; 

        // --- INICIALIZACIÓN ---
        document.addEventListener('DOMContentLoaded', async () => {
            await dbSystem.init();
            actualizarReloj();
            cargarProductos();
            
            const input = document.getElementById('inputBusqueda');
            input.focus();
            
            document.addEventListener('click', (e) => {
                if (!e.target.closest('input') && !e.target.closest('button') && !document.querySelector('.modal-overlay.active')) {
                    input.focus();
                }
            });

            input.addEventListener('input', (e) => buscarProductos(e.target.value));
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    intentarAgregarPorCodigo(e.target.value);
                }
            });

            setInterval(actualizarReloj, 1000);
        });

        function actualizarReloj() {
            const ahora = new Date();
            document.getElementById('reloj').innerText = ahora.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }

        async function cargarProductos() {
            productosCache = await dbSystem.obtenerProductos();
            buscarProductos(''); 
        }

        // --- EL FIX QUIRÚRGICO DEL BUSCADOR ---
        function buscarProductos(texto) {
            const grid = document.getElementById('gridResultados');
            grid.innerHTML = '';
            
            const termino = texto.toLowerCase().trim();
            const terminoLimpio = texto.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
            
            const filtrados = productosCache.filter(p => {
                const estadoStr = (p.estado || p.status || 'activo').toLowerCase();
                if (estadoStr === 'inactivo') return false;
                
                const nombreProd = (p.nombre || p.name || 'Sin nombre').toLowerCase();
                const codRealLimpio = (p.codigo_barras || '').replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
                const codGenLimpio = 'ID' + String(p.id || '').replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
                
                return nombreProd.includes(termino) || codRealLimpio.includes(terminoLimpio) || codGenLimpio.includes(terminoLimpio);
            });

            filtrados.forEach(p => {
                const card = document.createElement('div');
                card.className = 'producto-card';
                card.onclick = () => window.agregarAlCarrito(p);
                
                const nombreMostrar = p.nombre || p.name || 'Producto sin nombre';
                const precioMostrar = parseFloat(p.precio_gs || p.price || 0);

                card.innerHTML = `
                    <div class="prod-nombre">${nombreMostrar}</div>
                    <div class="prod-variante">${p.variante || ''}</div>
                    <div class="prod-precio">${precioMostrar.toLocaleString('es-PY')} Gs</div>
                `;
                grid.appendChild(card);
            });
        }

        // --- FUNCIONES GLOBALES EXPORTADAS ---
        window.abrirEscanerCamara = function() {
            document.getElementById('modalScanner').classList.add('active');
            const feedbackEl = document.getElementById('scannerFeedback');
            feedbackEl.innerText = "Conectando al lente...";
            feedbackEl.style.color = "var(--color-gold)";
            isScanningPaused = false;
            
            motorCamara = new Html5Qrcode("reader");
            motorCamara.start(
                { facingMode: "environment" }, 
                { fps: 10 },
                onScanSuccess,
                (err) => {} // Fail silencioso
            ).then(() => {
                feedbackEl.innerText = "Apunta al código de barras";
            }).catch((err) => {
                feedbackEl.innerText = "Error: " + (err.message || err);
                feedbackEl.style.color = "var(--color-danger)";
            });
        };

        // --- FIX DEL ESCÁNER PARA FIREBASE ---
        function onScanSuccess(decodedText, decodedResult) {
            if (isScanningPaused) return; 
            isScanningPaused = true; 
            const feedbackEl = document.getElementById('scannerFeedback');
            
            // Limpiamos lo que lee la cámara
            const codigoBuscado = decodedText.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
            
            const prod = productosCache.find(p => {
                const codReal = (p.codigo_barras || '').replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
                const idLimpio = String(p.id || '').replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
                const codGen = 'ID' + idLimpio; 
                
                // Buscar por código de barras, por ID limpio, o por ID+número
                return codReal === codigoBuscado || idLimpio === codigoBuscado || codGen === codigoBuscado;
            });

            if (prod) {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    osc.type = 'sine'; osc.frequency.value = 1000; osc.connect(ctx.destination);
                    osc.start(); setTimeout(() => osc.stop(), 100);
                } catch(e) {}

                window.agregarAlCarrito(prod);
                feedbackEl.innerText = `✅ ¡Agregado! ${prod.nombre || prod.name || 'Producto'}`;
                feedbackEl.style.color = "var(--color-success)";
            } else {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    osc.type = 'square'; osc.frequency.value = 300; osc.connect(ctx.destination);
                    osc.start(); setTimeout(() => osc.stop(), 300);
                } catch(e) {}
                feedbackEl.innerText = `❌ Código no existe: [${decodedText}]`;
                feedbackEl.style.color = "var(--color-danger)";
            }

            setTimeout(() => {
                if (motorCamara) { 
                    feedbackEl.innerText = "Apunta al siguiente código...";
                    feedbackEl.style.color = "var(--color-gold)";
                    isScanningPaused = false; 
                }
            }, 1500);
        }

        window.cerrarEscanerCamara = function() {
            document.getElementById('modalScanner').classList.remove('active');
            isScanningPaused = true; 
            if (motorCamara) {
                motorCamara.stop().then(() => {
                    motorCamara.clear(); motorCamara = null;
                }).catch(() => { motorCamara.clear(); motorCamara = null; });
            }
            document.getElementById('inputBusqueda').focus();
        };

        // --- FIX DEL BUSCADOR MANUAL PARA FIREBASE ---
        function intentarAgregarPorCodigo(codigo) {
            if (!codigo) return;
            const codigoBuscado = codigo.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
            
            const prod = productosCache.find(p => {
                const codReal = (p.codigo_barras || '').replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
                const idLimpio = String(p.id || '').replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
                const codGen = 'ID' + idLimpio;
                
                // Buscar por código de barras, por ID limpio, o por ID+número
                return codReal === codigoBuscado || idLimpio === codigoBuscado || codGen === codigoBuscado;
            });
            
            if (prod) {
                window.agregarAlCarrito(prod);
                document.getElementById('inputBusqueda').value = ''; 
                buscarProductos(''); 
            } else {
                alert(`❌ Código no encontrado: [${codigo}]`);
            }
        }

        window.agregarAlCarrito = function(producto) {
            const itemEnCarrito = carrito.find(item => item.producto.id === producto.id);
            const cantidadEnCarrito = itemEnCarrito ? itemEnCarrito.cantidad : 0;
            const stockActual = parseFloat(producto.stock_actual) || 99; // Fallback si no hay stock_actual
            const nombreMostrar = producto.nombre || producto.name || 'Producto sin nombre';
            const precioMostrar = parseFloat(producto.precio_gs || producto.price || 0);
            
            if (stockActual - cantidadEnCarrito <= 0) {
                alert(`⛔ ¡PRODUCTO AGOTADO!\nNo queda stock de: ${nombreMostrar}`);
                return; 
            }

            if (stockActual - cantidadEnCarrito <= (producto.stock_minimo || 5) && cantidadEnCarrito === 0) {
                alert(`⚠️ ATENCIÓN: Poco stock de ${nombreMostrar}\nQuedan: ${stockActual}`);
            }

            if (itemEnCarrito) {
                itemEnCarrito.cantidad++;
            } else {
                carrito.push({ producto: producto, cantidad: 1, precio: precioMostrar, nombreMostrado: nombreMostrar });
            }
            renderizarCarrito();
            document.getElementById('inputBusqueda').value = ''; 
            document.getElementById('inputBusqueda').focus();
        };

        window.cambiarCantidad = function(index, delta) {
            carrito[index].cantidad += delta;
            if (carrito[index].cantidad <= 0) carrito.splice(index, 1);
            renderizarCarrito();
        };

        function renderizarCarrito() {
            const lista = document.getElementById('listaCarrito');
            lista.innerHTML = '';
            let subtotal = 0;

            if (carrito.length === 0) {
                lista.innerHTML = '<div style="text-align: center; color: #555; margin-top: 50px;">Carrito vacío</div>';
            } else {
                carrito.forEach((item, index) => {
                    const totalItem = item.cantidad * item.precio;
                    subtotal += totalItem;
                    lista.innerHTML += `
                        <div class="carrito-item">
                            <div class="item-info">
                                <span class="item-nombre">${item.nombreMostrado}</span>
                                <span class="item-precio">${item.cantidad} x ${item.precio.toLocaleString()} = ${totalItem.toLocaleString()}</span>
                            </div>
                            <div class="item-controles">
                                <button class="btn-qty" onclick="window.cambiarCantidad(${index}, -1)">-</button>
                                <span class="item-cantidad">${item.cantidad}</span>
                                <button class="btn-qty" onclick="window.cambiarCantidad(${index}, 1)">+</button>
                            </div>
                        </div>
                    `;
                });
            }

            const ivaTotal = Math.round(subtotal / 11);
            document.getElementById('txtSubtotal').innerText = (subtotal - ivaTotal).toLocaleString('es-PY') + ' Gs';
            document.getElementById('txtIva').innerText = ivaTotal.toLocaleString('es-PY') + ' Gs';
            document.getElementById('txtTotal').innerText = subtotal.toLocaleString('es-PY') + ' Gs';
            totalGlobal = subtotal;
        }

        window.abrirModalCobro = function() {
            if (carrito.length === 0) return alert("El carrito está vacío.");
            document.getElementById('modalCobro').classList.add('active');
            document.getElementById('inputRecibido').value = '';
            document.getElementById('txtVuelto').innerText = '0 Gs';
            if (metodoPago === 'EFECTIVO') setTimeout(() => document.getElementById('inputRecibido').focus(), 100);
        };

        window.cerrarModalCobro = function() {
            document.getElementById('modalCobro').classList.remove('active');
            document.getElementById('inputBusqueda').focus();
        };

        window.setMetodo = function(metodo) {
            metodoPago = metodo;
            const botones = document.querySelectorAll('.btn-pago');
            botones.forEach(b => b.classList.remove('active'));
            if(metodo === 'EFECTIVO') botones[0].classList.add('active');
            else botones[1].classList.add('active');

            const input = document.getElementById('inputRecibido');
            if (metodo === 'TRANSFERENCIA') {
                input.value = totalGlobal;
                input.disabled = true;
                window.calcularVuelto();
            } else {
                input.value = '';
                input.disabled = false;
                input.focus();
            }
        };

        window.calcularVuelto = function() {
            const recibido = parseInt(document.getElementById('inputRecibido').value) || 0;
            const vuelto = recibido - totalGlobal;
            const el = document.getElementById('txtVuelto');
            if (vuelto >= 0) {
                el.innerText = vuelto.toLocaleString('es-PY') + ' Gs';
                el.style.color = 'var(--color-success)';
            } else {
                el.innerText = 'Falta: ' + Math.abs(vuelto).toLocaleString('es-PY') + ' Gs';
                el.style.color = 'var(--color-danger)';
            }
        };

        window.finalizarVenta = async function() {
            const recibido = parseInt(document.getElementById('inputRecibido').value) || 0;
            if (metodoPago === 'EFECTIVO' && recibido < totalGlobal) return alert("Monto menor al total.");
            
            const btn = document.getElementById('btn-confirmar-venta');
            btn.disabled = true; btn.innerText = "Procesando...";

            try {
                // 1. Obtener número de venta
                const txCount = dbSystem.db.transaction(['ventas'], 'readonly');
                const reqCount = txCount.objectStore('ventas').count();
                const siguienteNum = await new Promise(res => { reqCount.onsuccess = () => res((reqCount.result + 1).toString().padStart(3, '0')); });

                const venta = {
                    numero_comprobante: siguienteNum,
                    fecha_hora: new Date(),
                    total_gs: totalGlobal,
                    iva_total: Math.round(totalGlobal / 11),
                    forma_pago: metodoPago,
                    estado: 'PAGADO'
                };

                // 2. Guardar Localmente para máxima velocidad
                const tx = dbSystem.db.transaction(['ventas', 'detalle_ventas', 'productos'], 'readwrite');
                const ventaReq = tx.objectStore('ventas').add(venta);

                ventaReq.onsuccess = (e) => {
                    const ventaId = e.target.result;
                    const detStore = tx.objectStore('detalle_ventas');
                    const prodStore = tx.objectStore('productos');

                    carrito.forEach(item => {
                        detStore.add({
                            venta_id: ventaId, producto_id: item.producto.id,
                            cantidad: item.cantidad, precio_unitario: item.precio,
                            iva_unitario: Math.round(item.precio / 11)
                        });
                        // Restar stock local
                        const prod = item.producto;
                        prod.stock_actual = (parseFloat(prod.stock_actual) || 99) - item.cantidad;
                        prodStore.put(prod);
                    });
                };

                tx.oncomplete = async () => {
                    ultimaVentaDatos = {
                        numero: siguienteNum, fecha: venta.fecha_hora,
                        total: venta.total_gs, iva: venta.iva_total,
                        metodo: venta.forma_pago, items: [...carrito] 
                    };

                    // === 3. MAGIA DE FIREBASE: SUBIR VENTA A LA NUBE ===
                    try {
                        const nuevaVentaRef = push(ref(rtdb, 'ventas'));
                        await set(nuevaVentaRef, {
                            numero: siguienteNum,
                            fecha: venta.fecha_hora.toISOString(),
                            total: venta.total_gs,
                            metodo: venta.forma_pago,
                            cajera: "Dueña",
                            items: carrito.map(item => ({
                                id: item.producto.id, nombre: item.nombreMostrado,
                                cantidad: item.cantidad, precio: item.precio
                            }))
                        });

                        // Actualizar stock en la Nube
                        const updates = {};
                        carrito.forEach(item => {
                            updates['productos/' + item.producto.id + '/stock_actual'] = item.producto.stock_actual;
                        });
                        await update(ref(rtdb), updates);
                        console.log("✅ Venta sincronizada a la Nube");
                    } catch(err) {
                        console.error("⚠️ Guardado local, pero error al subir a la nube:", err);
                    }
                    // ====================================================

                    window.cerrarModalCobro();
                    document.getElementById('exitoNro').innerText = siguienteNum;
                    document.getElementById('modalExito').classList.add('active');
                    btn.disabled = false; btn.innerText = "✅ CONFIRMAR";
                };

            } catch (error) {
                console.error(error); alert("Error crítico al procesar.");
                btn.disabled = false; btn.innerText = "✅ CONFIRMAR";
            }
        };

        window.prepararNuevaVenta = function() {
            carrito = []; renderizarCarrito(); ultimaVentaDatos = null;
            document.getElementById('modalExito').classList.remove('active');
            cargarProductos(); 
            document.getElementById('inputBusqueda').focus();
        };

        // --- PDF Y WHATSAPP (Mantenemos tu lógica igual) ---
        window.descargarTicketPDF = function() {
            if (!ultimaVentaDatos) return;
            const config = JSON.parse(localStorage.getItem('marilynConfig')) || { nombre: 'Creaciones Marilyn E.A.S.', ruc: '80167718-1', direccion: 'Luque, Paraguay', telefono: '' };
            const { jsPDF } = window.jspdf;
            const alturaTotal = 120 + (ultimaVentaDatos.items.length * 6) + 40; 
            const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: [80, alturaTotal] });
            const centro = 40; let y = 10;
            
            doc.setFont("helvetica", "bold"); doc.setFontSize(14); doc.text(config.nombre, centro, y, { align: "center" });
            y += 5; doc.setFontSize(10); doc.setFont("helvetica", "normal"); doc.text(`RUC: ${config.ruc}`, centro, y, { align: "center" });
            y += 5; doc.text(config.direccion, centro, y, { align: "center" });
            if(config.telefono) { y += 5; doc.text(`Tel: ${config.telefono}`, centro, y, { align: "center" }); }
            y += 8; doc.setLineDashPattern([1, 1], 0); doc.line(5, y, 75, y); 
            y += 6; doc.setFontSize(9); doc.text(`Ticket Nro: ${ultimaVentaDatos.numero}`, 5, y);
            y += 5; doc.text(`Fecha: ${ultimaVentaDatos.fecha.toLocaleString('es-PY')}`, 5, y);
            y += 4; doc.line(5, y, 75, y); doc.setLineDashPattern([], 0); 
            y += 5; doc.setFont("helvetica", "bold"); doc.text("CANT", 5, y); doc.text("PRODUCTO", 18, y); doc.text("TOTAL", 75, y, { align: "right" });
            y += 2; doc.line(5, y, 75, y);
            y += 5; doc.setFont("helvetica", "normal");
            
            ultimaVentaDatos.items.forEach(item => {
                doc.text(item.cantidad.toString(), 5, y);
                doc.text(item.nombreMostrado.substring(0, 20), 18, y);
                doc.text((item.cantidad * item.precio).toLocaleString('es-PY'), 75, y, { align: "right" });
                y += 5;
            });
            
            y += 2; doc.line(5, y, 75, y);
            y += 6; doc.text("Subtotal:", 35, y); doc.text((ultimaVentaDatos.total - ultimaVentaDatos.iva).toLocaleString('es-PY'), 75, y, { align: "right" });
            y += 5; doc.text("IVA (10% incl.):", 35, y); doc.text(ultimaVentaDatos.iva.toLocaleString('es-PY'), 75, y, { align: "right" });
            y += 7; doc.setFontSize(12); doc.setFont("helvetica", "bold"); doc.text("TOTAL Gs:", 30, y); doc.text(ultimaVentaDatos.total.toLocaleString('es-PY'), 75, y, { align: "right" });
            y += 6; doc.setFontSize(9); doc.setFont("helvetica", "normal"); doc.text(`Forma de pago: ${ultimaVentaDatos.metodo}`, 5, y);
            y += 4; doc.line(5, y, 75, y); y += 5;
            
            const qrDiv = document.getElementById('qrOculto'); qrDiv.innerHTML = '';
            new QRCode(qrDiv, { text: `Comprobante Nro: ${ultimaVentaDatos.numero} | Total: ${ultimaVentaDatos.total} Gs`, width: 128, height: 128, correctLevel : QRCode.CorrectLevel.L });
            setTimeout(() => {
                const qrCanvas = qrDiv.querySelector('canvas');
                if (qrCanvas) { doc.addImage(qrCanvas.toDataURL('image/jpeg'), 'JPEG', 25, y, 30, 30); y += 35; }
                doc.setFont("helvetica", "italic"); doc.text("¡Gracias por su compra!", centro, y, { align: "center" });
                doc.save(`Ticket_${ultimaVentaDatos.numero}.pdf`);
            }, 100); 
        };

        window.enviarPorWhatsApp = function() {
            if (!ultimaVentaDatos) return;
            const texto = `¡Hola! 👋 Gracias por tu compra en Creaciones Marilyn.\n\n*Comprobante N°:* ${ultimaVentaDatos.numero}\n*Total:* ${ultimaVentaDatos.total.toLocaleString('es-PY')} Gs.\n\n_Te adjunto tu ticket de compra._`;
            window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`, '_blank');
        };

    </script>
