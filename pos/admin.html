<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Creaciones Marilyn</title>
    <link rel="stylesheet" href="css/marilyn.css">
    <style>
        .stock-ok { background-color: rgba(76, 175, 80, 0.1); color: #4CAF50; font-weight: bold; }
        .stock-warning { background-color: rgba(255, 193, 7, 0.1); color: #FFC107; font-weight: bold; }
        .stock-danger { background-color: rgba(244, 67, 54, 0.1); color: #F44336; font-weight: bold; }
        .btn-mini { padding: 5px 10px; font-size: 14px; height: auto; margin-left: 5px; cursor: pointer; border-radius: 4px; border: none; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
        .checkbox-wrapper { display: flex; align-items: center; gap: 10px; background: #222; padding: 15px; border-radius: 8px; border: 1px solid #444; margin-top: 10px; }
        .checkbox-wrapper input[type="checkbox"] { width: 20px; height: 20px; accent-color: #D4AF37; cursor: pointer; }
        .checkbox-wrapper label { margin: 0; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

    <header style="display: flex; justify-content: space-between; align-items: center;">
        <h1>💎 Marilyn Panel E-commerce (Cloudinary + Firebase)</h1>
        <div>
            <a href="index.html" class="btn" style="background: transparent; border: 1px solid var(--color-gold); color: var(--color-gold);">Ir a Caja ➡</a>
        </div>
    </header>

    <div class="container">
        <section class="card">
            <h2 id="formTitle">Nuevo Producto</h2>
            <form id="productForm">
                <input type="hidden" id="prodId">
                <div class="row">
                    <div class="col">
                        <label for="codigo">Código de Barras / Ref:</label>
                        <input type="text" id="codigo" placeholder="Ej: A001" required>
                    </div>
                    <div class="col">
                        <label for="categoria">Categoría:</label>
                        <input type="text" id="categoria" list="listaCategorias" placeholder="Ej: Collares" required>
                        <datalist id="listaCategorias"></datalist>
                    </div>
                </div>
                <div class="row">
                    <div class="col">
                        <label for="nombre">Nombre del Producto:</label>
                        <input type="text" id="nombre" placeholder="Ej: Collar de Perlas" required>
                    </div>
                    <div class="col">
                        <label for="variante">Variante (Color/Talle):</label>
                        <input type="text" id="variante" placeholder="Ej: Dorado / 45cm">
                    </div>
                </div>
                <div class="row">
                    <div class="col">
                        <label for="precio">Precio (Gs):</label>
                        <input type="number" id="precio" placeholder="0" required>
                    </div>
                    <div class="col">
                        <label for="iva">IVA (%):</label>
                        <select id="iva">
                            <option value="10">10%</option>
                            <option value="5">5%</option>
                            <option value="0">Exento</option>
                        </select>
                    </div>
                </div>
                <div class="row">
                    <div class="col">
                        <label for="stock">Stock Actual:</label>
                        <input type="number" id="stock" placeholder="0" required>
                    </div>
                    <div class="col">
                        <label for="minimo">Stock Mínimo (Alerta):</label>
                        <input type="number" id="minimo" value="2">
                    </div>
                </div>
                
                <div class="row mt-2">
                    <div class="col">
                        <label for="imgUrl" style="color: var(--color-gold);">🖼️ URL de Foto (Cloudinary):</label>
                        <input type="text" id="imgUrl" placeholder="Dejá vacío para mantener la foto actual">
                    </div>
                </div>
                
                <div class="checkbox-wrapper">
                    <input type="checkbox" id="destacado">
                    <label for="destacado" style="color: #FFD700; font-weight: bold;">🌟 Mostrar como Destacado en Inicio</label>
                    
                    <input type="checkbox" id="popup" style="margin-left: 20px;">
                    <label for="popup" style="color: #FF4500; font-weight: bold;">🔥 Lanzar como Pop-up (Oferta Especial)</label>
                </div>

                <div class="mt-2 text-right">
                    <button type="button" class="btn" onclick="window.limpiarFormulario()" style="background:#555; color:white;">Cancelar</button>
                    <button type="submit" class="btn btn-primary">💾 Guardar en la Nube</button>
                </div>
            </form>
        </section>

        <section class="card">
            <h2>Inventario Actual (Nube)</h2>
            <input type="text" id="searchInput" placeholder="🔍 Buscar por nombre o código..." onkeyup="window.cargarTabla()" style="width: 100%; padding: 10px; margin-bottom: 15px;">
            <div class="table-responsive">
                <table id="tablaProductos" style="width: 100%; text-align: left;">
                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Producto</th>
                            <th>Precio Gs</th>
                            <th>Stock / Estado</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyInventario"></tbody>
                </table>
            </div>
        </section>
    </div>

    <div id="modalStock" class="modal-overlay">
        <div class="card" style="width: 400px; background: #222; border: 2px solid var(--color-gold);">
            <h3 id="stockTitleProd" style="color: var(--color-gold); text-align: center;">📦 Reponer Stock</h3>
            <input type="hidden" id="stockIdProd">
            <input type="number" id="stockCantidad" placeholder="Cantidad a sumar" style="width: 100%; padding: 10px; margin: 10px 0;">
            <div style="display: flex; gap: 10px;">
                <button class="btn" onclick="document.getElementById('modalStock').style.display='none'">Cancelar</button>
                <button class="btn btn-success" onclick="window.confirmarCargaStock()">✅ Sumar Stock</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBmPvAk_lSJ1TlBVtMqKAC1HaPM5eVeZxo",
            authDomain: "creaciones-marilyn.firebaseapp.com",
            databaseURL: "https://creaciones-marilyn-default-rtdb.firebaseio.com",
            projectId: "creaciones-marilyn",
            storageBucket: "creaciones-marilyn.firebasestorage.app",
            messagingSenderId: "565099684746",
            appId: "1:565099684746:web:a99ccfb9796aea22725e73"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let listaProductos = [];

        onValue(ref(db, 'productos'), (snapshot) => {
            const data = snapshot.val();
            listaProductos = data ? Object.values(data) : [];
            actualizarComboCategorias();
            window.cargarTabla();
        });

        function actualizarComboCategorias() {
            const datalist = document.getElementById('listaCategorias');
            const categoriasUnicas = [...new Set(listaProductos.map(p => p.categoria || "Varios"))].sort();
            datalist.innerHTML = categoriasUnicas.map(cat => `<option value="${cat}">`).join('');
        }

        window.cargarTabla = function() {
            const tbody = document.getElementById('tbodyInventario');
            const filtro = document.getElementById('searchInput').value.toLowerCase();
            tbody.innerHTML = '';

            listaProductos.sort((a,b) => a.nombre.localeCompare(b.nombre)).forEach(p => {
                if (filtro && !p.nombre.toLowerCase().includes(filtro) && !String(p.codigo_barras || p.id).toLowerCase().includes(filtro)) return;

                const tr = document.createElement('tr');
                let clase = 'stock-ok';
                let texto = 'OK';
                if (p.stock_actual <= 0) { clase = 'stock-danger'; texto = 'AGOTADO'; }
                else if (p.stock_actual <= (p.stock_minimo || 2)) { clase = 'stock-warning'; texto = 'BAJO'; }

                let estrellas = p.destacado ? '🌟 ' : '';
                let popup = p.popup ? '🔥 ' : '';

                tr.innerHTML = `
                    <td style="padding: 10px; border-bottom: 1px solid #333;">${p.codigo_barras || p.id}</td>
                    <td style="padding: 10px; border-bottom: 1px solid #333;"><strong>${estrellas}${popup}${p.nombre}</strong><br><small style="color:#888;">${p.categoria}</small></td>
                    <td style="padding: 10px; border-bottom: 1px solid #333;">${Number(p.precio_gs).toLocaleString('es-PY')}</td>
                    <td style="padding: 10px; border-bottom: 1px solid #333;" class="${clase}">${p.stock_actual} un.<br><small>(${texto})</small></td>
                    <td style="padding: 10px; border-bottom: 1px solid #333;">
                        <button class="btn btn-primary btn-mini" onclick='window.editar(${JSON.stringify(p).replace(/'/g, "&apos;")})'>✏️ Editar</button>
                        <button class="btn btn-success btn-mini" onclick="window.abrirModalStock('${p.id}', '${p.nombre.replace(/'/g, "\\'")}')">➕ Stock</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        };

        window.editar = function(p) {
            document.getElementById('prodId').value = p.id;
            document.getElementById('codigo').value = p.codigo_barras || p.id;
            document.getElementById('categoria').value = p.categoria || '';
            document.getElementById('nombre').value = p.nombre || '';
            document.getElementById('variante').value = p.variante || '';
            document.getElementById('precio').value = p.precio_gs || 0;
            document.getElementById('iva').value = p.iva_pct || 10;
            document.getElementById('stock').value = p.stock_actual || 0;
            document.getElementById('minimo').value = p.stock_minimo || 2;
            
            // Limpiar input de imagen para no sobreescribir accidentalmente si no se cambia
            document.getElementById('imgUrl').value = '';

            document.getElementById('destacado').checked = (p.destacado === true || String(p.destacado) === 'true' || String(p.destacado) === '1');
            document.getElementById('popup').checked = (p.popup === true || String(p.popup) === 'true' || String(p.popup) === '1');

            document.getElementById('formTitle').innerText = "Editando: " + p.nombre;
            window.scrollTo(0, 0);
        };

        window.limpiarFormulario = function() {
            document.getElementById('productForm').reset();
            document.getElementById('prodId').value = '';
            document.getElementById('formTitle').innerText = "Nuevo Producto";
        };

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('prodId').value || Date.now().toString();
            
            // CAMBIO B: Blindaje de foto en la construcción del objeto producto
            const urlNueva = document.getElementById('imgUrl').value.trim();
            const pExistente = listaProductos.find(p => String(p.id) === String(id));
            const fotoActual = pExistente?.images?.[0] || pExistente?.img || pExistente?.imagen || pExistente?.image || 'img/logo_jpg.jpg';
            const imgFinal = urlNueva || fotoActual;

            const producto = {
                id: id,
                codigo_barras: document.getElementById('codigo').value.toUpperCase(),
                categoria: document.getElementById('categoria').value,
                nombre: document.getElementById('nombre').value,
                variante: document.getElementById('variante').value,
                precio_gs: parseInt(document.getElementById('precio').value),
                iva_pct: parseInt(document.getElementById('iva').value),
                stock_actual: parseInt(document.getElementById('stock').value),
                stock_minimo: parseInt(document.getElementById('minimo').value),
                
                // Los 3 campos garantizados para máxima compatibilidad con el frontend
                img: imgFinal,
                imagen: imgFinal,
                image: imgFinal,
                images: [imgFinal], 
                
                destacado: document.getElementById('destacado').checked,
                popup: document.getElementById('popup').checked,
                activo: true,
                estado: "normal"
            };

            // CAMBIO A: Reemplazar set() por update()
            await update(ref(db, 'productos/' + id), producto);
            alert("✅ Guardado Exitosamente");
            window.limpiarFormulario();
        });

        window.abrirModalStock = function(id, nombre) {
            document.getElementById('stockIdProd').value = id;
            document.getElementById('stockTitleProd').innerText = nombre;
            document.getElementById('modalStock').style.display = 'flex';
        };

        window.confirmarCargaStock = async function() {
            const id = document.getElementById('stockIdProd').value;
            const cant = parseInt(document.getElementById('stockCantidad').value);
            if (!cant) return;
            const p = listaProductos.find(prod => String(prod.id) === String(id));
            const nuevoStock = (parseInt(p.stock_actual) || 0) + cant;
            await update(ref(db, 'productos/' + id), { stock_actual: nuevoStock });
            document.getElementById('stockCantidad').value = '';
            document.getElementById('modalStock').style.display = 'none';
        };
    </script>
</body>
</html>
