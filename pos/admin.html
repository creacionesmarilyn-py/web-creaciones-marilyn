<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Creaciones Marilyn</title>
    <link rel="stylesheet" href="css/marilyn.css">
    <style>
        /* Semáforo de Stock */
        .stock-ok { background-color: rgba(76, 175, 80, 0.1); color: #4CAF50; font-weight: bold; }
        .stock-warning { background-color: rgba(255, 193, 7, 0.1); color: #FFC107; font-weight: bold; }
        .stock-danger { background-color: rgba(244, 67, 54, 0.1); color: #F44336; font-weight: bold; }
        .btn-mini { padding: 5px 10px; font-size: 14px; height: auto; margin-left: 5px; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
        .btn-danger-outline { background: transparent; border: 1px solid #F44336; color: #F44336; }
        .btn-danger-outline:hover { background: #F44336; color: white; }
    </style>
</head>
<body>

    <header style="display: flex; justify-content: space-between; align-items: center;">
        <h1>💎 Creaciones Marilyn POS (Sincronizado a la Nube)</h1>
        <div>
            <a href="index.html" class="btn" style="background: transparent; border: 1px solid var(--color-gold); color: var(--color-gold);">Ir a Caja ➡</a>
        </div>
    </header>

    <div class="container">
        <section class="card">
            <h2 id="formTitle">Nuevo Producto</h2>
            <form id="productForm">
                <input type="hidden" id="prodId">
                <div class="row">
                    <div class="col">
                        <label for="codigo">Código de Barras / Ref:</label>
                        <input type="text" id="codigo" placeholder="Ej: A001" required>
                    </div>
                    <div class="col">
                        <label for="categoria">Categoría:</label>
                        <select id="categoria">
                            <option value="Collares">Collares</option>
                            <option value="Pulseras">Pulseras</option>
                            <option value="Aros">Aros</option>
                            <option value="Anillos">Anillos</option>
                            <option value="Rosarios">Rosarios</option>
                            <option value="Varios">Varios</option>
                        </select>
                    </div>
                </div>
                <div class="row">
                    <div class="col">
                        <label for="nombre">Nombre del Producto:</label>
                        <input type="text" id="nombre" placeholder="Ej: Collar de Perlas" required>
                    </div>
                    <div class="col">
                        <label for="variante">Variante (Color/Talle):</label>
                        <input type="text" id="variante" placeholder="Ej: Dorado / 45cm">
                    </div>
                </div>
                <div class="row">
                    <div class="col">
                        <label for="precio">Precio (Gs):</label>
                        <input type="number" id="precio" placeholder="0" required>
                    </div>
                    <div class="col">
                        <label for="iva">IVA (%):</label>
                        <select id="iva">
                            <option value="10">10%</option>
                            <option value="5">5%</option>
                            <option value="0">Exento</option>
                        </select>
                    </div>
                </div>
                <div class="row">
                    <div class="col">
                        <label for="stock">Stock Actual:</label>
                        <input type="number" id="stock" placeholder="0" required>
                    </div>
                    <div class="col">
                        <label for="minimo">Stock Mínimo (Alerta):</label>
                        <input type="number" id="minimo" value="2">
                    </div>
                </div>
                <div class="mt-2 text-right">
                    <button type="button" class="btn" onclick="window.limpiarFormulario()" style="background:#555; color:white;">Cancelar</button>
                    <button type="submit" class="btn btn-primary">💾 Guardar Producto en la Nube</button>
                </div>
            </form>
        </section>

        <details class="card">
            <summary style="font-size: 1.2rem; font-weight: bold; cursor: pointer; color: var(--color-gold);">📥 Importar Desde Excel / CSV</summary>
            <div class="mt-2">
                <textarea id="importInput" rows="5" placeholder="Pega aquí los datos..." style="height: 150px; width: 100%; background: #111; color: #fff;"></textarea>
                <div class="row mt-2">
                    <div class="col"><button onclick="window.procesarImportacion('CSV')" class="btn btn-primary">📂 Importar CSV</button></div>
                </div>
            </div>
        </details>

        <details class="card">
            <summary style="font-size: 1.2rem; font-weight: bold; cursor: pointer; color: var(--color-gold);">⚙️ Configuración del Ticket</summary>
            <div class="mt-2 row">
                <div class="col"><label>Negocio:</label><input type="text" id="confNombre" value="Creaciones Marilyn E.A.S."></div>
                <div class="col"><label>RUC:</label><input type="text" id="confRuc" value="80167718-1"></div>
            </div>
            <div class="mt-2 text-right"><button class="btn btn-primary" onclick="window.guardarConfiguracion()">💾 Guardar Config</button></div>
        </details>

        <section class="card">
            <h2>Inventario Actual (Nube)</h2>
            <input type="text" id="searchInput" placeholder="🔍 Buscar..." onkeyup="window.cargarTabla()">
            <div class="table-responsive">
                <table id="tablaProductos">
                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Producto</th>
                            <th>Precio Gs</th>
                            <th>Stock / Estado</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyInventario"></tbody>
                </table>
            </div>
        </section>
    </div>

    <div id="modalStock" class="modal-overlay">
        <div class="card" style="width: 400px; background: #222; border: 2px solid var(--color-gold);">
            <h3 id="stockTitleProd" style="color: var(--color-gold); text-align: center;">📦 Reponer Stock</h3>
            <input type="hidden" id="stockIdProd">
            <input type="number" id="stockCantidad" placeholder="Cantidad" style="width: 100%; padding: 10px; margin: 10px 0;">
            <div style="display: flex; gap: 10px;">
                <button class="btn" onclick="document.getElementById('modalStock').style.display='none'">Cerrar</button>
                <button class="btn btn-success" onclick="window.confirmarCargaStock()">✅ Guardar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBmPvAk_lSJ1TlBVtMqKAC1HaPM5eVeZxo",
            authDomain: "creaciones-marilyn.firebaseapp.com",
            databaseURL: "https://creaciones-marilyn-default-rtdb.firebaseio.com",
            projectId: "creaciones-marilyn",
            storageBucket: "creaciones-marilyn.firebasestorage.app",
            messagingSenderId: "565099684746",
            appId: "1:565099684746:web:a99ccfb9796aea22725e73"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let listaProductos = [];

        // --- CARGAR DATOS EN TIEMPO REAL ---
        onValue(ref(db, 'productos'), (snapshot) => {
            const data = snapshot.val();
            listaProductos = data ? Object.values(data) : [];
            window.cargarTabla();
        });

        // --- FUNCIONES GLOBALES ---
        window.cargarTabla = function() {
            const tbody = document.getElementById('tbodyInventario');
            const filtro = document.getElementById('searchInput').value.toLowerCase();
            tbody.innerHTML = '';

            listaProductos.sort((a,b) => a.nombre.localeCompare(b.nombre)).forEach(p => {
                if (filtro && !p.nombre.toLowerCase().includes(filtro) && !String(p.codigo_barras).toLowerCase().includes(filtro)) return;

                const tr = document.createElement('tr');
                let clase = 'stock-ok';
                let texto = 'OK';
                if (p.stock_actual <= 0) { clase = 'stock-danger'; texto = 'AGOTADO'; }
                else if (p.stock_actual <= (p.stock_minimo || 2)) { clase = 'stock-warning'; texto = 'BAJO'; }

                tr.innerHTML = `
                    <td>${p.codigo_barras || '-'}</td>
                    <td><strong>${p.nombre}</strong><br><small>${p.variante || ''} (${p.categoria})</small></td>
                    <td>${Number(p.precio_gs).toLocaleString('es-PY')}</td>
                    <td class="${clase}">${p.stock_actual} un.<br><small>(${texto})</small></td>
                    <td>
                        <button class="btn btn-primary btn-mini" onclick='window.editar(${JSON.stringify(p)})'>✏️</button>
                        <button class="btn btn-success btn-mini" onclick="window.abrirModalStock('${p.id}', '${p.nombre.replace(/'/g, "\\'")}')">➕</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        };

        window.editar = function(p) {
            document.getElementById('prodId').value = p.id;
            document.getElementById('codigo').value = p.codigo_barras;
            document.getElementById('categoria').value = p.categoria;
            document.getElementById('nombre').value = p.nombre;
            document.getElementById('variante').value = p.variante || '';
            document.getElementById('precio').value = p.precio_gs;
            document.getElementById('iva').value = p.iva_pct || 10;
            document.getElementById('stock').value = p.stock_actual;
            document.getElementById('minimo').value = p.stock_minimo || 2;
            document.getElementById('formTitle').innerText = "Editar Producto";
            window.scrollTo(0, 0);
        };

        window.limpiarFormulario = function() {
            document.getElementById('productForm').reset();
            document.getElementById('prodId').value = '';
            document.getElementById('formTitle').innerText = "Nuevo Producto";
        };

        // --- GUARDAR EN FIREBASE ---
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('prodId').value || Date.now().toString();
            const producto = {
                id: id,
                codigo_barras: document.getElementById('codigo').value.toUpperCase(),
                categoria: document.getElementById('categoria').value,
                nombre: document.getElementById('nombre').value,
                variante: document.getElementById('variante').value,
                precio_gs: parseInt(document.getElementById('precio').value),
                iva_pct: parseInt(document.getElementById('iva').value),
                stock_actual: parseInt(document.getElementById('stock').value),
                stock_minimo: parseInt(document.getElementById('minimo').value),
                images: ["img/logo_jpg.jpg"]
            };

            await set(ref(db, 'productos/' + id), producto);
            alert("✅ Sincronizado con la nube");
            window.limpiarFormulario();
        });

        window.abrirModalStock = function(id, nombre) {
            document.getElementById('stockIdProd').value = id;
            document.getElementById('stockTitleProd').innerText = nombre;
            document.getElementById('modalStock').style.display = 'flex';
        };

        window.confirmarCargaStock = async function() {
            const id = document.getElementById('stockIdProd').value;
            const cant = parseInt(document.getElementById('stockCantidad').value);
            if (!cant) return;
            const p = listaProductos.find(prod => String(prod.id) === String(id));
            const nuevoStock = (parseInt(p.stock_actual) || 0) + cant;
            await update(ref(db, 'productos/' + id), { stock_actual: nuevoStock });
            document.getElementById('modalStock').style.display = 'none';
        };
        
        window.guardarConfiguracion = function() {
            const config = {
                nombre: document.getElementById('confNombre').value,
                ruc: document.getElementById('confRuc').value
            };
            localStorage.setItem('marilynConfig', JSON.stringify(config));
            alert("Configuración guardada.");
        };
    </script>
</body>
</html>
