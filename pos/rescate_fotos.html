<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Rescate Extremo de Fotos Marilyn</title>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; text-align: center; padding: 30px; }
        .card { background: #222; padding: 30px; border-radius: 10px; border: 2px solid #D4AF37; max-width: 700px; margin: 0 auto; }
        button { background: #D4AF37; color: black; padding: 15px 30px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 20px; }
        #missingList { text-align: left; font-size: 13px; color: #ff9999; max-height: 250px; overflow-y: auto; background: #000; padding: 15px; margin-top: 20px; border: 1px solid #444; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🖼️ Rescate Extremo de Fotos</h1>
        <p>Búsqueda inteligente: Ignora acentos, mayúsculas y cruza por códigos.</p>
        <button onclick="rescatarFotosExtremo()" id="btnRescate">🚀 INICIAR ESCANEO PROFUNDO</button>
        <h2 id="status" style="margin-top: 20px;"></h2>
        
        <div id="missingList">
            <h3 style="color: white; margin-top: 0;">Productos que NO estaban en la base antigua:</h3>
            <ul id="listaNoEncontrados"></ul>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBmPvAk_lSJ1TlBVtMqKAC1HaPM5eVeZxo",
            authDomain: "creaciones-marilyn.firebaseapp.com",
            databaseURL: "https://creaciones-marilyn-default-rtdb.firebaseio.com",
            projectId: "creaciones-marilyn",
            storageBucket: "creaciones-marilyn.firebasestorage.app",
            messagingSenderId: "565099684746",
            appId: "1:565099684746:web:a99ccfb9796aea22725e73"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Super filtro: quita acentos, convierte a minúsculas y elimina espacios extra
        function normalizar(texto) {
            if (!texto) return "";
            return String(texto).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, " ").trim();
        }

        window.rescatarFotosExtremo = async function() {
            const statusEl = document.getElementById('status');
            const btn = document.getElementById('btnRescate');
            const missingListDiv = document.getElementById('missingList');
            const ulNoEncontrados = document.getElementById('listaNoEncontrados');
            
            btn.disabled = true;
            ulNoEncontrados.innerHTML = '';
            missingListDiv.style.display = 'none';
            statusEl.innerText = "⏳ Descargando base de datos antigua...";
            statusEl.style.color = "yellow";

            try {
                const res = await fetch("https://raw.githubusercontent.com/creacionesmarilyn-py/web-creaciones-marilyn/main/database.json?v=" + Date.now());
                const oldData = await res.json();
                const arrayViejo = oldData.products || oldData.productos || [];
                
                statusEl.innerText = "⏳ Leyendo Firebase...";
                const snapshot = await get(ref(db, 'productos'));
                const currentData = snapshot.val();

                if (!currentData) throw new Error("Firebase está vacío.");

                statusEl.innerText = "⏳ Aplicando Inteligencia de Búsqueda...";
                const updates = {};
                let fotosRecuperadas = 0;
                let noEncontrados = [];

                for (const key in currentData) {
                    const pActual = currentData[key];
                    const nombreActualNorm = normalizar(pActual.nombre);
                    const codActualNorm = normalizar(pActual.codigo_barras);

                    // Búsqueda en la base vieja
                    const pViejo = arrayViejo.find(op => {
                        // 1. Coincidencia exacta de ID
                        if (String(op.id) === String(pActual.id)) return true;
                        
                        // 2. Coincidencia de nombre (sin acentos/mayúsculas)
                        if (normalizar(op.name || op.nombre) === nombreActualNorm) return true;
                        
                        // 3. Coincidencia de código de barras
                        if (codActualNorm && codActualNorm !== "" && normalizar(op.codigo_barras || op.ref) === codActualNorm) return true;
                        
                        return false;
                    });

                    if (pViejo && (pViejo.image || pViejo.images)) {
                        const arrayImagenes = pViejo.images || [pViejo.image];
                        updates[`productos/${key}/images`] = arrayImagenes;
                        fotosRecuperadas++;
                    } else {
                        noEncontrados.push(`${pActual.id} | ${pActual.nombre}`);
                    }
                }

                if (Object.keys(updates).length > 0) {
                    await update(ref(db), updates);
                    statusEl.innerText = `✅ ¡Rescate Extremo Completado! Se inyectaron ${fotosRecuperadas} fotos a Firebase.`;
                    statusEl.style.color = "#00ff00";
                } else {
                    statusEl.innerText = "⚠️ No se lograron cruzar más fotos nuevas.";
                    statusEl.style.color = "orange";
                }

                // Mostrar los que realmente no tienen foto en la base vieja
                if (noEncontrados.length > 0) {
                    missingListDiv.style.display = 'block';
                    noEncontrados.forEach(item => {
                        const li = document.createElement('li');
                        li.innerText = item;
                        ulNoEncontrados.appendChild(li);
                    });
                }

            } catch (error) {
                statusEl.innerText = "❌ Error: " + error.message;
                statusEl.style.color = "red";
            } finally {
                btn.disabled = false;
                btn.innerText = "VOLVER A INTENTAR";
            }
        };
    </script>
</body>
</html>
